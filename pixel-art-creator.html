<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pixel Art Creator</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:#1a1a2e;color:#e0e0e0;font-family:'Segoe UI',system-ui,sans-serif;font-size:13px;
         height:100vh;display:flex;flex-direction:column;overflow:hidden;user-select:none}

    /* ── Header ── */
    #header{background:#16213e;border-bottom:1px solid #0f3460;padding:6px 10px;
            display:flex;align-items:center;gap:8px;flex-shrink:0;flex-wrap:wrap}
    #header h1{font-size:14px;font-weight:700;color:#e94560;letter-spacing:1px;white-space:nowrap}
    .sep{width:1px;height:20px;background:#0f3460;flex-shrink:0}
    .tool-group{display:flex;gap:3px;align-items:center}

    button{background:#0f3460;border:1px solid #1a4a7a;color:#c0d0e0;border-radius:5px;
           padding:4px 9px;cursor:pointer;font-size:12px;transition:background .12s,border-color .12s;white-space:nowrap}
    button:hover{background:#1a5a9a;border-color:#4a8aba}
    button.active{background:#e94560;border-color:#ff6a80;color:#fff}
    button.icon-btn{padding:4px 7px;font-size:14px}
    button.icon-btn svg{display:block;width:16px;height:16px;fill:currentColor}
    button.green{background:#1a6a3a;border-color:#2a9a5a;color:#afffcf;font-weight:600}
    button.green:hover{background:#2a8a4a}
    button.red{background:#6a2020;border-color:#9a3030;color:#ffafaf}
    button.red:hover{background:#8a3030}

    select,input[type=number]{background:#0f3460;border:1px solid #1a4a7a;color:#c0d0e0;
      border-radius:5px;padding:4px 6px;font-size:12px;cursor:pointer}
    select:hover,input[type=number]:hover{border-color:#4a8aba}
    input[type=number]{width:46px;text-align:center}
    label{color:#8090a0;font-size:12px}

    /* ── Main layout ── */
    #main{display:flex;flex:1;overflow:hidden}

    /* ── Left panel ── */
    #left-panel{width:138px;background:#16213e;border-right:1px solid #0f3460;
                display:flex;flex-direction:column;padding:8px;gap:8px;overflow-y:auto;flex-shrink:0}
    .panel-title{font-size:10px;text-transform:uppercase;letter-spacing:1px;color:#506070;margin-bottom:3px}

    #color-picker-wrap{position:relative}
    #color-picker{display:block;width:100%;height:34px;border:1px solid #34557f;border-radius:5px;cursor:pointer;background:none;padding:0}
    #color-detail-popover{position:fixed;top:0;left:0;width:228px;background:#111b32;
      border:1px solid #24456f;border-radius:10px;padding:10px;display:none;z-index:20;
      box-shadow:0 18px 40px rgba(0,0,0,0.45)}
    #color-detail-popover.open{display:block}
    #color-detail-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
    #color-detail-head span{font-size:10px;text-transform:uppercase;letter-spacing:1px;color:#6f8db9}
    #color-detail-close{background:none;border:none;color:#6f8db9;padding:0 2px;font-size:14px;cursor:pointer}
    #color-detail-close:hover{color:#d7e7ff}
    #color-wheel-wrap{position:relative;width:150px;height:150px;margin:0 auto 10px}
    #color-wheel{display:block;width:150px;height:150px;cursor:crosshair}
    #color-wheel-marker{position:absolute;width:12px;height:12px;border:2px solid #fff;border-radius:50%;
      box-shadow:0 0 0 1px rgba(0,0,0,0.55);pointer-events:none;transform:translate(-50%,-50%)}
    #color-square-wrap{position:relative;width:150px;height:150px;margin:0 auto 10px}
    #color-square{display:block;width:150px;height:150px;border-radius:8px;cursor:crosshair}
    #color-square-marker{position:absolute;width:12px;height:12px;border:2px solid #fff;border-radius:50%;
      box-shadow:0 0 0 1px rgba(0,0,0,0.55);pointer-events:none;transform:translate(-50%,-50%)}
    #color-detail-meta{display:grid;grid-template-columns:1fr 1fr;gap:8px;align-items:center}
    #color-preview-chip{height:32px;border-radius:7px;border:1px solid #31537d}
    #color-hsv-label{font-size:10px;color:#7d9ac5;line-height:1.5;white-space:pre-line}
    #color-hex{background:#0f3460;border:1px solid #1a4a7a;color:#c0d0e0;border-radius:5px;
               padding:3px 6px;font-size:12px;font-family:monospace;width:100%}
    #swatches,#recent-colors{display:grid;grid-template-columns:repeat(5,1fr);gap:3px}
    .swatch{width:100%;aspect-ratio:1;border-radius:3px;cursor:pointer;border:2px solid transparent;
            transition:transform .1s,border-color .1s}
    .swatch:hover{transform:scale(1.15);border-color:#fff4}
    .swatch.selected{border-color:#fff}
    .swatch-transparent{background:repeating-conic-gradient(#aaa 0% 25%,#fff 0% 50%) 0 0/8px 8px}

    /* ── Canvas area ── */
    #canvas-area{flex:1;display:flex;align-items:center;justify-content:center;overflow:auto;
                 background:repeating-conic-gradient(#252540 0% 25%,#1e1e38 0% 50%) 0 0/20px 20px;
                 position:relative}
    #canvas-wrapper{position:relative;cursor:crosshair}
    #main-canvas,#grid-overlay,#onion-canvas,#selection-overlay{display:block;image-rendering:pixelated;position:absolute;top:0;left:0}
    #main-canvas{position:relative}

    /* ── Right panel (tile preview) ── */
    #right-panel{width:166px;background:#16213e;border-left:1px solid #0f3460;
                 flex-direction:column;padding:8px;gap:8px;display:none;flex-shrink:0}
    #right-panel.visible{display:flex}
    #tile-canvas{image-rendering:pixelated;border:1px solid #0f3460;border-radius:4px;width:150px;height:150px}

    /* ── Timeline ── */
    #timeline{background:#12192e;border-top:1px solid #0f3460;flex-shrink:0;
              display:flex;flex-direction:column;height:114px}
    #playback-bar{display:flex;align-items:center;gap:6px;padding:5px 8px;
                  border-bottom:1px solid #0f3460;flex-shrink:0}
    #playback-bar .sep{height:16px}
    #selection-actions{display:none;align-items:center;gap:6px;padding:5px 8px;
                      border-bottom:1px solid #0f3460;flex-shrink:0;flex-wrap:wrap;background:#10182d}
    #selection-actions.visible{display:flex}
    #selection-actions .actions-label{font-size:10px;text-transform:uppercase;letter-spacing:1px;color:#6f86a8}
    #selection-actions button{padding:3px 8px;font-size:11px}
    #frame-strip-wrap{display:flex;align-items:center;gap:0;overflow-x:auto;overflow-y:hidden;
                      flex:1;padding:6px 8px;gap:5px}
    #frame-strip-wrap::-webkit-scrollbar{height:4px}
    #frame-strip-wrap::-webkit-scrollbar-track{background:#0a1020}
    #frame-strip-wrap::-webkit-scrollbar-thumb{background:#2a4a6a;border-radius:2px}

    .frame-thumb{flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:2px;
                 cursor:pointer;position:relative}
    .frame-thumb canvas{width:56px;height:56px;image-rendering:pixelated;border:2px solid #1a4a7a;
                         border-radius:4px;transition:border-color .1s}
    .frame-thumb:hover canvas{border-color:#4a8aba}
    .frame-thumb.active canvas{border-color:#e94560}
    .frame-thumb .frame-num{font-size:10px;color:#506070}
    .frame-thumb .frame-btns{position:absolute;top:-1px;right:-1px;display:none;gap:2px}
    .frame-thumb:hover .frame-btns{display:flex}
    .frame-btn{background:#0a1828cc;border:1px solid #2a4a6a;color:#c0d0e0;border-radius:3px;
               font-size:10px;padding:1px 3px;cursor:pointer;line-height:1.2}
    .frame-btn:hover{background:#e94560;border-color:#ff6a80}

    #btn-add-frame{flex-shrink:0;height:60px;width:40px;font-size:18px;color:#4a8aba;
                   border-style:dashed;background:transparent;border-color:#2a5a8a}
    #btn-add-frame:hover{background:#0f3460;border-color:#4a8aba;color:#e0e0e0}

    /* Status bar */
    #statusbar{background:#16213e;border-top:1px solid #0f3460;padding:3px 10px;
               font-size:11px;color:#506070;display:flex;gap:14px;flex-shrink:0}

    /* ── Project integration ── */
    #sprite-name,#sprite-folder{background:#0f3460;border:1px solid #1a4a7a;color:#c0d0e0;border-radius:5px;
                 padding:4px 6px;font-size:12px}
    #sprite-name{width:118px}
    #sprite-folder{width:126px}
    #sprite-name::placeholder,#sprite-folder::placeholder{color:#3a5a7a}
    #project-badge{font-size:11px;color:#506070;white-space:nowrap;max-width:130px;
                   overflow:hidden;text-overflow:ellipsis}
    .proj-sprite{display:flex;align-items:center;gap:5px;padding:3px 4px;cursor:pointer;
                 border-radius:4px;border:1px solid transparent;transition:border-color .1s}
    .proj-sprite:hover{border-color:#2a4a6a;background:#0f1f3a}
    .proj-sprite canvas{flex-shrink:0;border:1px solid #1a3a6a;border-radius:2px;image-rendering:pixelated}
    .proj-sprite-name{font-size:11px;color:#c0d0e0;overflow:hidden;text-overflow:ellipsis;
                      white-space:nowrap;flex:1}
    .proj-sprite-folder{font-size:9px;color:#6070a0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    a.hub-link{color:#4a8aba;font-size:12px;text-decoration:none;padding:4px 8px;
               background:#0f3460;border:1px solid #1a4a7a;border-radius:5px;white-space:nowrap}
    a.hub-link:hover{background:#1a5a9a;border-color:#4a8aba;color:#e0e0e0}

    /* ── Sprite tags ── */
    #tag-chips{display:flex;gap:3px;align-items:center;flex-wrap:nowrap}
    .tag-chip{font-size:10px;padding:2px 7px;border-radius:20px;cursor:pointer;
              border:1px solid transparent;opacity:0.45;transition:opacity .1s,border-color .1s;
              font-weight:600;letter-spacing:.3px;white-space:nowrap;user-select:none}
    .tag-chip:hover{opacity:0.75}
    .tag-chip.on{opacity:1;border-color:rgba(255,255,255,0.3)}
    .tag-chip[data-tag="tile"]     {background:#1a5a3a;color:#6fffa0}
    .tag-chip[data-tag="character"]{background:#1a3a7a;color:#80b0ff}
    .tag-chip[data-tag="bg"]       {background:#3a1a6a;color:#c080ff}
    .tag-chip[data-tag="fg"]       {background:#5a1a3a;color:#ff80b0}
    .tag-chip[data-tag="ui"]       {background:#5a3a1a;color:#ffb060}
    .tag-chip[data-tag="item"]     {background:#4a4a1a;color:#ffee60}
    .tag-chip[data-tag="effect"]   {background:#1a4a4a;color:#60eeff}
    .proj-sprite-tags{display:flex;gap:2px;flex-wrap:wrap;margin-top:2px}
    .proj-tag-badge{font-size:9px;padding:1px 5px;border-radius:20px;font-weight:600;opacity:0.9}
    .proj-tag-badge[data-tag="tile"]     {background:#1a5a3a;color:#6fffa0}
    .proj-tag-badge[data-tag="character"]{background:#1a3a7a;color:#80b0ff}
    .proj-tag-badge[data-tag="bg"]       {background:#3a1a6a;color:#c080ff}
    .proj-tag-badge[data-tag="fg"]       {background:#5a1a3a;color:#ff80b0}
    .proj-tag-badge[data-tag="ui"]       {background:#5a3a1a;color:#ffb060}
    .proj-tag-badge[data-tag="item"]     {background:#4a4a1a;color:#ffee60}
    .proj-tag-badge[data-tag="effect"]   {background:#1a4a4a;color:#60eeff}

    /* Tooltip */
    [data-tip]{position:relative}
    [data-tip]:hover::after{content:attr(data-tip);position:absolute;bottom:calc(100% + 4px);
      left:50%;transform:translateX(-50%);background:#000c;color:#fff;padding:2px 6px;
      border-radius:4px;white-space:nowrap;font-size:11px;pointer-events:none;z-index:100}
    #header [data-tip]:hover::after{top:calc(100% + 4px);bottom:auto}
  </style>
</head>
<body>

<!-- ═══════ HEADER ═══════ -->
<div id="header">
  <h1>&#9632; PIXEL ART</h1>
  <div class="sep"></div>

  <div class="tool-group">
    <button class="icon-btn"        data-tool="select"  data-tip="Select (V)" aria-label="Select">
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <path d="M5 5h5v2H7v3H5V5Zm9 0h5v5h-2V7h-3V5ZM5 14h2v3h3v2H5v-5Zm12 0h2v5h-5v-2h3v-3Zm-8-4h6v6H9v-6Zm2 2v2h2v-2h-2Z"/>
      </svg>
    </button>
    <button class="icon-btn active" data-tool="pencil"  data-tip="Pencil (P)">&#9998;</button>
    <button class="icon-btn"        data-tool="eraser"  data-tip="Eraser (E)">&#9003;</button>
    <button class="icon-btn"        data-tool="fill"    data-tip="Fill (F)" aria-label="Fill">
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <path d="M7.81 2.53a1 1 0 0 1 1.41 0l7.25 7.25a3 3 0 0 1 0 4.24l-1.06 1.06 1.47 1.47a1 1 0 0 1-.71 1.71H7.52a3.5 3.5 0 0 1-3.24-2.18 3.52 3.52 0 0 1 .76-3.82l6.01-6.02-3.24-3.24a1 1 0 0 1 0-1.41Zm4.65 4.65-6.01 6.01a1.52 1.52 0 0 0-.33 1.65 1.5 1.5 0 0 0 1.4.92h6.24l1.29-1.29a1 1 0 0 1 .05-.06l1.06-1.06a1 1 0 0 0 0-1.41l-3.7-3.7ZM18.5 18a2.5 2.5 0 0 1 2.5 2.5c0 1.38-1.12 2.5-2.5 2.5S16 21.88 16 20.5c0-.54.21-1.04.59-1.41.56-.57 1.48-1.58 1.91-2.18.43.6 1.35 1.61 1.91 2.18.38.37.59.87.59 1.41Z"/>
      </svg>
    </button>
    <button class="icon-btn"        data-tool="picker"  data-tip="Eyedropper (I)">&#128449;</button>
    <button class="icon-btn"        data-tool="rect"    data-tip="Rectangle (R)">&#9645;</button>
    <button class="icon-btn"        data-tool="line"    data-tip="Line (L)">&#11835;</button>
  </div>
  <div class="sep"></div>

  <div class="tool-group">
    <button id="btn-zoom-out" class="icon-btn" data-tip="Zoom Out (-)">&#8722;</button>
    <span id="zoom-label" style="color:#8090a0;min-width:36px;text-align:center">100%</span>
    <button id="btn-zoom-in"  class="icon-btn" data-tip="Zoom In (+)">&#43;</button>
  </div>
  <div class="sep"></div>

  <div class="tool-group">
    <label>Size</label>
    <select id="grid-size-select">
      <option value="8">8×8</option>
      <option value="16" selected>16×16</option>
      <option value="32">32×32</option>
      <option value="48">48×48</option>
      <option value="64">64×64</option>
    </select>
    <button id="btn-toggle-grid" data-tip="Toggle Grid (G)">Grid &#10003;</button>
    <button id="btn-mirror" data-tip="Mirror Draw (M)">Mirror</button>
    <button id="btn-tile-preview" data-tip="Tile Preview (T)">Tile</button>
  </div>
  <div class="sep"></div>

  <div class="tool-group">
    <button id="btn-undo" data-tip="Undo (Ctrl+Z)">&#8630; Undo</button>
    <button id="btn-redo" data-tip="Redo (Ctrl+Y)">&#8631; Redo</button>
  </div>
  <div class="sep"></div>

  <div class="tool-group">
    <button id="btn-new" class="red">&#43; New</button>
    <button id="btn-save"  data-tip="Save .pixelart file (Ctrl+S)">&#128190; Save</button>
    <button id="btn-load"  data-tip="Open a saved .pixelart file">&#128194; Open</button>
    <button id="btn-import-image" data-tip="Import PNG / JPG / WebP into the current canvas">&#128444; Import</button>
    <input type="file" id="file-input" accept=".pixelart,.json" style="display:none">
    <input type="file" id="image-file-input" accept="image/png,image/jpeg,image/webp" style="display:none">
  </div>
  <div class="sep"></div>
  <div class="tool-group">
    <button id="btn-export-png"   class="green" data-tip="Export current frame">&#8681; PNG</button>
    <button id="btn-export-sheet" class="green" data-tip="Export all frames as sprite sheet">&#8681; Sheet</button>
    <button id="btn-export-gif"   class="green" data-tip="Export animated GIF">&#8681; GIF</button>
  </div>
  <div class="sep"></div>
  <!-- Project integration -->
  <div class="tool-group">
    <span id="project-badge" data-tip="Active RPG Studio project">No Project</span>
  </div>
  <div class="sep"></div>
  <div class="tool-group">
    <label>Sprite</label>
    <input type="text" id="sprite-name" placeholder="e.g. hero_idle" data-tip="Name for saving to project">
    <label>Folder</label>
    <input type="text" id="sprite-folder" placeholder="e.g. tiles/terrain" data-tip="Optional folder path for project asset grouping">
    <div id="tag-chips">
      <span class="tag-chip" data-tag="tile">tile</span>
      <span class="tag-chip" data-tag="character">char</span>
      <span class="tag-chip" data-tag="bg">bg</span>
      <span class="tag-chip" data-tag="fg">fg</span>
      <span class="tag-chip" data-tag="ui">ui</span>
      <span class="tag-chip" data-tag="item">item</span>
      <span class="tag-chip" data-tag="effect">fx</span>
    </div>
    <button id="btn-save-to-project" class="green" data-tip="Save sprite into RPG Studio project (Ctrl+Shift+S)">&#128190; Save to Project</button>
  </div>
  <div class="sep"></div>
  <div class="tool-group">
    <a href="index.html" class="hub-link" target="_self">&#8592; Hub</a>
  </div>
</div>

<!-- ═══════ MAIN ═══════ -->
<div id="main">
  <div id="left-panel">
    <div>
      <div class="panel-title">Color</div>
      <div id="color-picker-wrap">
        <button type="button" id="color-picker" aria-label="Open detailed color picker"></button>
        <div id="color-detail-popover" aria-hidden="true">
          <div id="color-detail-head">
            <span>Detail Picker</span>
            <button type="button" id="color-detail-close" aria-label="Close color picker">✕</button>
          </div>
          <div id="color-wheel-wrap">
            <canvas id="color-wheel" width="150" height="150"></canvas>
            <div id="color-wheel-marker"></div>
          </div>
          <div id="color-square-wrap">
            <canvas id="color-square" width="150" height="150"></canvas>
            <div id="color-square-marker"></div>
          </div>
          <div id="color-detail-meta">
            <div id="color-preview-chip"></div>
            <div id="color-hsv-label"></div>
          </div>
        </div>
      </div>
      <input type="text"  id="color-hex" value="#e94560" maxlength="7" spellcheck="false" style="margin-top:4px">
    </div>
    <div>
      <div class="panel-title">Palette</div>
      <div id="swatches"></div>
    </div>
    <div>
      <div class="panel-title">Recent</div>
      <div id="recent-colors"></div>
    </div>
    <div id="project-sprites-section" style="display:none">
      <div class="panel-title">Project Sprites</div>
      <div id="project-sprites-list"></div>
    </div>
  </div>

  <div id="canvas-area">
    <div id="canvas-wrapper">
      <canvas id="main-canvas"></canvas>
      <canvas id="onion-canvas"  style="pointer-events:none;opacity:1"></canvas>
      <canvas id="grid-overlay"  style="pointer-events:none"></canvas>
      <canvas id="selection-overlay" style="pointer-events:none"></canvas>
    </div>
  </div>

  <div id="right-panel">
    <div class="panel-title">Tile Preview (3×3)</div>
    <canvas id="tile-canvas"></canvas>
  </div>
</div>

<!-- ═══════ TIMELINE ═══════ -->
<div id="timeline">
  <div id="playback-bar">
    <button id="btn-prev-frame" class="icon-btn" data-tip="Prev Frame ([)">&#9664;</button>
    <button id="btn-play"       class="icon-btn" data-tip="Play/Pause (Space)">&#9654;</button>
    <button id="btn-next-frame" class="icon-btn" data-tip="Next Frame (])">&#9654;&#9654;</button>
    <div class="sep"></div>
    <label>FPS</label>
    <input type="number" id="fps-input" value="8" min="1" max="60">
    <div class="sep"></div>
    <button id="btn-onion" data-tip="Onion Skin (O)">Onion Skin</button>
    <button id="btn-copy-next" data-tip="Copy selection to the next frame">Sel &#8594; Next</button>
    <div class="sep"></div>
    <span id="frame-counter" style="color:#506070;font-size:12px">Frame 1 / 1</span>
  </div>
  <div id="selection-actions">
    <span class="actions-label">Selection</span>
    <button id="btn-paste-in-place" data-tip="Paste clipboard at its original coordinates">Paste In Place</button>
    <button id="btn-flip-h" data-tip="Flip selected pixels horizontally">Flip H</button>
    <button id="btn-flip-v" data-tip="Flip selected pixels vertically">Flip V</button>
    <button id="btn-rotate" data-tip="Rotate selected pixels 90° clockwise">Rotate</button>
    <button id="btn-crop-selection" data-tip="Crop the sprite canvas to the current selection">Crop to Selection</button>
    <button id="btn-deselect" data-tip="Clear the current selection">Deselect</button>
  </div>
  <div id="frame-strip-wrap">
    <!-- frames injected here -->
    <button id="btn-add-frame" data-tip="Add Frame (A)">&#43;</button>
  </div>
</div>

<!-- Status bar -->
<div id="statusbar">
  <span id="status-tool">Tool: Pencil</span>
  <span id="status-pos">Cursor: —</span>
  <span id="status-color">Color: #e94560</span>
  <span id="status-size">Canvas: 16×16</span>
</div>

<script src="project-utils.js"></script>
<script>
'use strict';

const {
  PROJECT_KEY,
  blankProject,
  drawImageToCanvas,
  imageDataToFrame,
  getProject,
  loadImageFile,
  slugifyName,
  setProject,
  normalizeSpriteData,
  normalizeFolderPath,
  normalizeRecentColors,
} = window.ProjectUtils;

// ══════════════════════════════════════════════════════
//  GIF ENCODER
// ══════════════════════════════════════════════════════

function lzwEncode(indices, minCodeSize) {
  const cc = 1 << minCodeSize, eoi = cc + 1;
  const out = []; let buf = 0, bits = 0;
  const emit = (val, len) => {
    buf |= val << bits; bits += len;
    while (bits >= 8) { out.push(buf & 255); buf >>>= 8; bits -= 8; }
  };
  let codeLen = minCodeSize + 1, nextCode = eoi + 1, limit = 1 << codeLen;
  let dict = new Map();
  emit(cc, codeLen);
  if (!indices.length) { emit(eoi, codeLen); if (bits) out.push(buf & 255); return out; }
  let prev = indices[0];
  for (let i = 1; i < indices.length; i++) {
    const cur = indices[i], key = (prev << 12) | cur;
    // key only works if prev < 4096 and cur < 4096 — true for GIF codes
    if (dict.has(key)) {
      prev = dict.get(key);
    } else {
      emit(prev, codeLen);
      if (nextCode < 4096) {
        dict.set(key, nextCode++);
        if (nextCode > limit && codeLen < 12) { codeLen++; limit <<= 1; }
      } else {
        emit(cc, codeLen);
        codeLen = minCodeSize + 1; limit = 1 << codeLen; nextCode = eoi + 1; dict = new Map();
      }
      prev = cur;
    }
  }
  emit(prev, codeLen); emit(eoi, codeLen);
  if (bits) out.push(buf & 255);
  return out;
}

function encodeGIF(pixelFrames, w, h, delayCs) {
  // pixelFrames: array of flat arrays (null | '#rrggbb')
  const colorSet = new Set();
  pixelFrames.forEach(f => f.forEach(p => { if (p) colorSet.add(p); }));
  const palette = [null, ...[...colorSet].slice(0, 255)]; // index 0 = transparent
  const colorMap = new Map(palette.map((c, i) => [c, i]));
  let cb = 1; while ((1 << cb) < palette.length) cb++;
  const tableSize = 1 << cb;
  const minCS = Math.max(2, cb);

  const bytes = [];
  const wb = (...b) => b.forEach(v => bytes.push(v & 255));
  const ws = s => [...s].forEach(c => bytes.push(c.charCodeAt(0)));
  const ww = n => { bytes.push(n & 255); bytes.push((n >> 8) & 255); };

  ws('GIF89a'); ww(w); ww(h);
  wb(0x80 | (cb - 1), 0, 0); // GCT present, bg=0, aspect=0
  for (let i = 0; i < tableSize; i++) {
    const c = palette[i];
    if (!c) { wb(0,0,0); continue; }
    wb(parseInt(c.slice(1,3),16), parseInt(c.slice(3,5),16), parseInt(c.slice(5,7),16));
  }
  // Netscape loop extension
  wb(0x21,0xff,0x0b); ws('NETSCAPE2.0'); wb(0x03,0x01); ww(0); wb(0x00);

  pixelFrames.forEach(frame => {
    const indices = new Uint8Array(w * h);
    for (let i = 0; i < frame.length; i++)
      indices[i] = frame[i] ? (colorMap.get(frame[i]) || 0) : 0;
    // Graphic Control Ext: disposal=2 (restore to bg), transparent=1, index=0
    wb(0x21, 0xf9, 0x04, 0x09); ww(delayCs); wb(0x00, 0x00);
    // Image descriptor
    wb(0x2c); ww(0); ww(0); ww(w); ww(h); wb(0x00);
    // LZW data
    wb(minCS);
    const lzw = lzwEncode(indices, minCS);
    let i = 0;
    while (i < lzw.length) {
      const sz = Math.min(255, lzw.length - i); wb(sz);
      for (let j = 0; j < sz; j++) wb(lzw[i++]);
    }
    wb(0x00);
  });
  wb(0x3b);
  return new Uint8Array(bytes);
}

function hexToRgb(hex) {
  const match = /^#?([0-9a-f]{6})$/i.exec(String(hex || '').trim());
  if (!match) return null;
  const value = match[1];
  return {
    r: parseInt(value.slice(0, 2), 16),
    g: parseInt(value.slice(2, 4), 16),
    b: parseInt(value.slice(4, 6), 16),
  };
}

function componentToHex(value) {
  return Math.max(0, Math.min(255, Math.round(value))).toString(16).padStart(2, '0');
}

function rgbToHexValue({ r, g, b }) {
  return `#${componentToHex(r)}${componentToHex(g)}${componentToHex(b)}`;
}

function rgbToHsv({ r, g, b }) {
  const rn = r / 255;
  const gn = g / 255;
  const bn = b / 255;
  const max = Math.max(rn, gn, bn);
  const min = Math.min(rn, gn, bn);
  const delta = max - min;
  let h = 0;
  if (delta) {
    if (max === rn) h = ((gn - bn) / delta) % 6;
    else if (max === gn) h = (bn - rn) / delta + 2;
    else h = (rn - gn) / delta + 4;
    h *= 60;
    if (h < 0) h += 360;
  }
  const s = max === 0 ? 0 : delta / max;
  return { h, s, v: max };
}

function hsvToRgb({ h, s, v }) {
  const hue = ((h % 360) + 360) % 360;
  const c = v * s;
  const x = c * (1 - Math.abs((hue / 60) % 2 - 1));
  const m = v - c;
  let r1 = 0, g1 = 0, b1 = 0;
  if (hue < 60) { r1 = c; g1 = x; }
  else if (hue < 120) { r1 = x; g1 = c; }
  else if (hue < 180) { g1 = c; b1 = x; }
  else if (hue < 240) { g1 = x; b1 = c; }
  else if (hue < 300) { r1 = x; b1 = c; }
  else { r1 = c; b1 = x; }
  return {
    r: (r1 + m) * 255,
    g: (g1 + m) * 255,
    b: (b1 + m) * 255,
  };
}

function syncColorPickerUi() {
  colorPicker.style.backgroundColor = state.color;
  colorPicker.style.backgroundImage = 'none';
  colorPreviewChip.style.backgroundColor = state.color;
  colorHsvLabel.textContent = `H ${Math.round(state.colorHsv.h)}°\nS ${Math.round(state.colorHsv.s * 100)}%\nV ${Math.round(state.colorHsv.v * 100)}%`;
}

function drawColorWheel() {
  const { width, height } = colorWheel;
  const cx = width / 2;
  const cy = height / 2;
  const radius = Math.min(cx, cy) - 4;
  const inner = radius - 18;
  colorWheelCtx.clearRect(0, 0, width, height);
  for (let angle = 0; angle < 360; angle += 1) {
    colorWheelCtx.beginPath();
    colorWheelCtx.strokeStyle = `hsl(${angle} 100% 50%)`;
    colorWheelCtx.lineWidth = radius - inner;
    colorWheelCtx.arc(cx, cy, (radius + inner) / 2, (angle - 1) * Math.PI / 180, (angle + 1) * Math.PI / 180);
    colorWheelCtx.stroke();
  }
  colorWheelCtx.beginPath();
  colorWheelCtx.fillStyle = '#111b32';
  colorWheelCtx.arc(cx, cy, inner - 1, 0, Math.PI * 2);
  colorWheelCtx.fill();
}

function drawColorSquare() {
  const { width, height } = colorSquare;
  const hueHex = rgbToHexValue(hsvToRgb({ h: state.colorHsv.h, s: 1, v: 1 }));
  colorSquareCtx.clearRect(0, 0, width, height);
  colorSquareCtx.fillStyle = hueHex;
  colorSquareCtx.fillRect(0, 0, width, height);
  const whiteGrad = colorSquareCtx.createLinearGradient(0, 0, width, 0);
  whiteGrad.addColorStop(0, '#ffffff');
  whiteGrad.addColorStop(1, 'rgba(255,255,255,0)');
  colorSquareCtx.fillStyle = whiteGrad;
  colorSquareCtx.fillRect(0, 0, width, height);
  const blackGrad = colorSquareCtx.createLinearGradient(0, 0, 0, height);
  blackGrad.addColorStop(0, 'rgba(0,0,0,0)');
  blackGrad.addColorStop(1, '#000000');
  colorSquareCtx.fillStyle = blackGrad;
  colorSquareCtx.fillRect(0, 0, width, height);
}

function updateColorPickerMarkers() {
  const radius = colorWheel.width / 2 - 13;
  const angle = state.colorHsv.h * Math.PI / 180;
  const wx = colorWheel.width / 2 + Math.cos(angle) * radius;
  const wy = colorWheel.height / 2 + Math.sin(angle) * radius;
  colorWheelMarker.style.left = `${wx}px`;
  colorWheelMarker.style.top = `${wy}px`;
  colorSquareMarker.style.left = `${state.colorHsv.s * (colorSquare.width - 1)}px`;
  colorSquareMarker.style.top = `${(1 - state.colorHsv.v) * (colorSquare.height - 1)}px`;
}

function refreshDetailedColorPicker() {
  drawColorWheel();
  drawColorSquare();
  updateColorPickerMarkers();
  syncColorPickerUi();
}

function setColorFromHsv(hsv) {
  state.colorHsv = {
    h: ((hsv.h % 360) + 360) % 360,
    s: Math.max(0, Math.min(1, hsv.s)),
    v: Math.max(0, Math.min(1, hsv.v)),
  };
  const hex = rgbToHexValue(hsvToRgb(state.colorHsv));
  setColor(hex, { preserveHsv: true });
}

function openColorPopover() {
  positionColorPopover();
  colorPopover.classList.add('open');
  colorPopover.setAttribute('aria-hidden', 'false');
  refreshDetailedColorPicker();
}

function closeColorPopover() {
  colorPopover.classList.remove('open');
  colorPopover.setAttribute('aria-hidden', 'true');
  state.colorPickerDrag = '';
}

function toggleColorPopover() {
  if (colorPopover.classList.contains('open')) closeColorPopover();
  else openColorPopover();
}

function positionColorPopover() {
  const rect = colorPicker.getBoundingClientRect();
  const gap = 12;
  const width = 228;
  const height = 360;
  let left = rect.right + gap;
  if (left + width > window.innerWidth - 12) {
    left = Math.max(12, rect.left - width - gap);
  }
  if (left < 12) left = Math.max(12, window.innerWidth - width - 12);

  let top = rect.top;
  if (top + height > window.innerHeight - 12) {
    top = Math.max(12, window.innerHeight - height - 12);
  }
  if (top < 12) top = 12;

  colorPopover.style.left = `${left}px`;
  colorPopover.style.top = `${top}px`;
}

function updateHueFromPointer(clientX, clientY) {
  const rect = colorWheel.getBoundingClientRect();
  const cx = rect.left + rect.width / 2;
  const cy = rect.top + rect.height / 2;
  const angle = Math.atan2(clientY - cy, clientX - cx);
  setColorFromHsv({ ...state.colorHsv, h: angle * 180 / Math.PI });
}

function updateSvFromPointer(clientX, clientY) {
  const rect = colorSquare.getBoundingClientRect();
  const s = Math.max(0, Math.min(1, (clientX - rect.left) / rect.width));
  const v = 1 - Math.max(0, Math.min(1, (clientY - rect.top) / rect.height));
  setColorFromHsv({ ...state.colorHsv, s, v });
}

function buildPalette() {

function setColor(c, options = {}) {
  state.color = c;

function applySampledPixel(color) {

}

// ══════════════════════════════════════════════════════
//  PIXEL HELPERS
// ══════════════════════════════════════════════════════

function idx(x, y)         { return y * state.gridW + x; }
function inBounds(x, y)    { return x >= 0 && y >= 0 && x < state.gridW && y < state.gridH; }
function getP(arr, x, y)   { return inBounds(x,y) ? arr[idx(x,y)] : undefined; }
function setP(arr, x, y, c){ if (inBounds(x,y)) arr[idx(x,y)] = c; }
function emptyFrame()      { return new Array(state.gridW * state.gridH).fill(null); }
function cloneFrame(f)     { return [...f]; }
function curFrame()        { return state.frames[state.currentFrame]; }
function clampX(x)         { return Math.max(0, Math.min(state.gridW - 1, x)); }
function clampY(y)         { return Math.max(0, Math.min(state.gridH - 1, y)); }

function normalizeRect(x0, y0, x1, y1) {
  const minX = clampX(Math.min(x0, x1));
  const minY = clampY(Math.min(y0, y1));
  const maxX = clampX(Math.max(x0, x1));
  const maxY = clampY(Math.max(y0, y1));
  return { x: minX, y: minY, w: maxX - minX + 1, h: maxY - minY + 1 };
}

function selectionBounds() {
  return state.selectionLifted
    ? { x: state.selectionLifted.x, y: state.selectionLifted.y, w: state.selectionLifted.w, h: state.selectionLifted.h }
    : (state.selectionDraft || state.selection);
}

function hasSelection() {
  const sel = selectionBounds();
  return Boolean(sel && sel.w > 0 && sel.h > 0);
}

function pointInRect(x, y, rect) {
  return Boolean(rect) && x >= rect.x && y >= rect.y && x < rect.x + rect.w && y < rect.y + rect.h;
}

function extractRegion(frame, rect) {
  const out = new Array(rect.w * rect.h).fill(null);
  for (let y = 0; y < rect.h; y++) {
    for (let x = 0; x < rect.w; x++) {
      const sx = rect.x + x;
      const sy = rect.y + y;
      if (inBounds(sx, sy)) out[y * rect.w + x] = frame[idx(sx, sy)];
    }
  }
  return out;
}

function clearRegion(frame, rect) {
  for (let y = 0; y < rect.h; y++) {
    for (let x = 0; x < rect.w; x++) {
      const sx = rect.x + x;
      const sy = rect.y + y;
      if (inBounds(sx, sy)) frame[idx(sx, sy)] = null;
    }
  }
}

function stampRegion(frame, rect, pixels) {
  for (let y = 0; y < rect.h; y++) {
    for (let x = 0; x < rect.w; x++) {
      const sx = rect.x + x;
      const sy = rect.y + y;
      if (!inBounds(sx, sy)) continue;
      frame[idx(sx, sy)] = pixels[y * rect.w + x] ?? null;
    }
  }
}

function regionHasContent(pixels) {
  return Array.isArray(pixels) && pixels.some(color => color !== null);
}

function clampSelectionOrigin(x, y, w, h) {
  return {
    x: Math.max(0, Math.min(state.gridW - w, x)),
    y: Math.max(0, Math.min(state.gridH - h, y)),
  };
}

function clearSelection() {
  state.selection = null;
  state.selectionDraft = null;
  state.selectionLifted = null;
}

function resetSelectionState(options = {}) {
  clearSelection();
  if (options.keepClipboard !== true) state.clipboard = null;
}

function updateSelectionControls() {
  const actions = document.getElementById('selection-actions');
  const selectionActive = hasSelection();
  const clipboardActive = Boolean(state.clipboard && regionHasContent(state.clipboard.pixels));
  if (actions) actions.classList.toggle('visible', selectionActive || clipboardActive);
  const btn = document.getElementById('btn-copy-next');
  if (btn) btn.disabled = !(selectionActive && state.currentFrame < state.frames.length - 1);
  const byId = id => document.getElementById(id);
  if (byId('btn-paste-in-place')) byId('btn-paste-in-place').disabled = !clipboardActive;
  if (byId('btn-flip-h')) byId('btn-flip-h').disabled = !selectionActive;
  if (byId('btn-flip-v')) byId('btn-flip-v').disabled = !selectionActive;
  if (byId('btn-rotate')) byId('btn-rotate').disabled = !selectionActive;
  if (byId('btn-crop-selection')) byId('btn-crop-selection').disabled = !selectionActive;
  if (byId('btn-deselect')) byId('btn-deselect').disabled = !selectionActive;
}

function syncGridSizeSelect() {
  const select = document.getElementById('grid-size-select');
  if (!select) return;
  let custom = select.querySelector('option[data-custom="true"]');
  const directValue = String(state.gridW);
  const hasPreset = state.gridW === state.gridH && [...select.options].some(option =>
    option.value === directValue && option.dataset.custom !== 'true');
  if (hasPreset) {
    if (custom) custom.remove();
    select.value = directValue;
    return;
  }
  if (!custom) {
    custom = document.createElement('option');
    custom.dataset.custom = 'true';
    select.appendChild(custom);
  }
  custom.value = `${state.gridW}x${state.gridH}`;
  custom.textContent = `${state.gridW}×${state.gridH}`;
  select.value = custom.value;
}

function syncCanvasSizeUi() {
  syncGridSizeSelect();
  document.getElementById('status-size').textContent = `Canvas: ${state.gridW}×${state.gridH}`;
}

// ══════════════════════════════════════════════════════
//  RENDERING
// ══════════════════════════════════════════════════════

const CHECKER_A = '#3a3a5a', CHECKER_B = '#2a2a4a';

function renderFrame(ctx, pixels, ps, alpha = 1) {
  if (alpha < 1) { ctx.globalAlpha = alpha; }
  for (let y = 0; y < state.gridH; y++) {
    for (let x = 0; x < state.gridW; x++) {
      const c = getP(pixels, x, y);
      if (c) { ctx.fillStyle = c; ctx.fillRect(x*ps, y*ps, ps, ps); }
    }
  }
  ctx.globalAlpha = 1;
}

function drawCheckerboard(ctx, ps) {
  for (let y = 0; y < state.gridH; y++)
    for (let x = 0; x < state.gridW; x++) {
      ctx.fillStyle = (x+y)%2===0 ? CHECKER_A : CHECKER_B;
      ctx.fillRect(x*ps, y*ps, ps, ps);
    }
}

function drawGridLines(ps) {
  if (!state.showGrid) { gctx.clearRect(0,0,gridCanvas.width,gridCanvas.height); return; }
  const w = state.gridW*ps, h = state.gridH*ps;
  gctx.clearRect(0,0,w,h);
  gctx.strokeStyle = 'rgba(0,0,0,0.22)'; gctx.lineWidth = 0.5;
  for (let x = 0; x <= state.gridW; x++) {
    gctx.beginPath(); gctx.moveTo(x*ps+.5,0); gctx.lineTo(x*ps+.5,h); gctx.stroke();
  }
  for (let y = 0; y <= state.gridH; y++) {
    gctx.beginPath(); gctx.moveTo(0,y*ps+.5); gctx.lineTo(w,y*ps+.5); gctx.stroke();
  }
}

function renderRegion(ctx, region, ps, alpha = 1) {
  if (!region) return;
  const { x: ox, y: oy, w, h, pixels } = region;
  if (alpha < 1) ctx.globalAlpha = alpha;
  for (let y = 0; y < h; y++) {
    for (let x = 0; x < w; x++) {
      const color = pixels[y * w + x];
      if (!color) continue;
      ctx.fillStyle = color;
      ctx.fillRect((ox + x) * ps, (oy + y) * ps, ps, ps);
    }
  }
  ctx.globalAlpha = 1;
}

function drawSelectionOverlay(ps) {
  sctx.clearRect(0, 0, selectionCanvas.width, selectionCanvas.height);
  const rect = selectionBounds();
  if (!rect) return;
  const px = rect.x * ps;
  const py = rect.y * ps;
  const pw = rect.w * ps;
  const ph = rect.h * ps;
  sctx.fillStyle = 'rgba(122, 202, 255, 0.12)';
  sctx.fillRect(px, py, pw, ph);
  sctx.setLineDash([6, 4]);
  sctx.lineDashOffset = -2;
  sctx.lineWidth = 2;
  sctx.strokeStyle = '#9ad8ff';
  sctx.strokeRect(px + 1, py + 1, Math.max(0, pw - 2), Math.max(0, ph - 2));
  sctx.setLineDash([]);
}

function renderOnion() {
  const ps = state.pixelSize;
  octx.clearRect(0,0,onionCanvas.width,onionCanvas.height);
  if (!state.onionSkin) return;
  const prev = state.currentFrame - 1, next = state.currentFrame + 1;
  // previous frame: blue tint
  if (prev >= 0) {
    octx.globalAlpha = 0.30;
    // tint blue
    const tmpC = document.createElement('canvas');
    tmpC.width = state.gridW; tmpC.height = state.gridH;
    const tc = tmpC.getContext('2d');
    state.frames[prev].forEach((c,i) => {
      if (c) { tc.fillStyle = c; tc.fillRect(i%state.gridW, Math.floor(i/state.gridW),1,1); }
    });
    octx.drawImage(tmpC, 0, 0, onionCanvas.width, onionCanvas.height);
    octx.fillStyle = 'rgba(0,80,255,0.3)';
    octx.fillRect(0,0,onionCanvas.width,onionCanvas.height);
    octx.globalAlpha = 1;
  }
  // next frame: red tint
  if (next < state.frames.length) {
    octx.globalAlpha = 0.20;
    const tmpC = document.createElement('canvas');
    tmpC.width = state.gridW; tmpC.height = state.gridH;
    const tc = tmpC.getContext('2d');
    state.frames[next].forEach((c,i) => {
      if (c) { tc.fillStyle = c; tc.fillRect(i%state.gridW, Math.floor(i/state.gridW),1,1); }
    });
    octx.drawImage(tmpC, 0, 0, onionCanvas.width, onionCanvas.height);
    octx.fillStyle = 'rgba(255,60,0,0.25)';
    octx.fillRect(0,0,onionCanvas.width,onionCanvas.height);
    octx.globalAlpha = 1;
  }
}

function renderTile() {
  if (!state.tilePreview) return;
  const tw = state.gridW, th = state.gridH, N = 3;
  tileCanvas.width = tw*N; tileCanvas.height = th*N;
  // draw 1x tile
  const tmp = document.createElement('canvas');
  tmp.width = tw; tmp.height = th;
  const tc = tmp.getContext('2d');
  for (let y = 0; y < th; y++) for (let x = 0; x < tw; x++) {
    tc.fillStyle = (x+y)%2===0 ? '#888' : '#aaa';
    tc.fillRect(x,y,1,1);
  }
  curFrame().forEach((c,i) => {
    if (c) { tc.fillStyle = c; tc.fillRect(i%tw, Math.floor(i/tw),1,1); }
  });
  for (let ty = 0; ty < N; ty++)
    for (let tx = 0; tx < N; tx++)
      tctx.drawImage(tmp, tx*tw, ty*th);
}

function renderThumb(canvas, frame) {
  const w = state.gridW, h = state.gridH;
  canvas.width = w; canvas.height = h;
  const ctx = canvas.getContext('2d');
  for (let y = 0; y < h; y++) for (let x = 0; x < w; x++) {
    ctx.fillStyle = (x+y)%2===0 ? '#3a3a5a' : '#2a2a4a';
    ctx.fillRect(x,y,1,1);
  }
  frame.forEach((c,i) => {
    if (c) { ctx.fillStyle = c; ctx.fillRect(i%w, Math.floor(i/w),1,1); }
  });
}

function render(previewPixels) {
  const ps = state.pixelSize;
  mctx.clearRect(0,0,mainCanvas.width,mainCanvas.height);
  drawCheckerboard(mctx, ps);
  renderFrame(mctx, curFrame(), ps);
  if (previewPixels) renderFrame(mctx, previewPixels, ps);
  if (state.selectionLifted) {
    renderRegion(mctx, {
      x: state.selectionLifted.x,
      y: state.selectionLifted.y,
      w: state.selectionLifted.w,
      h: state.selectionLifted.h,
      pixels: state.selectionLifted.pixels,
    }, ps, 0.96);
  }
  renderOnion();
  drawGridLines(ps);
  drawSelectionOverlay(ps);
  renderTile();
  updateSelectionControls();
  // update current thumb
  const thumbs = document.querySelectorAll('.frame-thumb canvas');
  if (thumbs[state.currentFrame]) renderThumb(thumbs[state.currentFrame], curFrame());
}

// ══════════════════════════════════════════════════════
//  HISTORY
// ══════════════════════════════════════════════════════

function makeHistorySnapshot() {
  return {
    gridW: state.gridW,
    gridH: state.gridH,
    frames: state.frames.map(cloneFrame),
    current: state.currentFrame,
  };
}

function historyEquals(a, b) {
  if (!a || !b || a.current !== b.current || a.gridW !== b.gridW || a.gridH !== b.gridH || a.frames.length !== b.frames.length) return false;
  for (let i = 0; i < a.frames.length; i++) {
    const af = a.frames[i], bf = b.frames[i];
    if (af.length !== bf.length) return false;
    for (let j = 0; j < af.length; j++) if (af[j] !== bf[j]) return false;
  }
  return true;
}

function saveHistory() {
  const snap = makeHistorySnapshot();
  const last = state.history[state.history.length - 1];
  if (last && historyEquals(last, snap)) return false;
  state.history = state.history.slice(0, state.historyIndex + 1);
  state.history.push(snap);
  state.historyIndex = state.history.length - 1;
  if (state.history.length > 80) { state.history.shift(); state.historyIndex--; }
  return true;
}

function resetHistory() {
  state.history = [];
  state.historyIndex = -1;
  saveHistory();
}

function undo() {
  if (state.historyIndex > 0) {
    state.historyIndex--;
    const snap = state.history[state.historyIndex];
    state.gridW = snap.gridW;
    state.gridH = snap.gridH;
    state.frames = snap.frames.map(cloneFrame);
    state.currentFrame = snap.current;
    resetSelectionState({ keepClipboard: true });
    resizeAllCanvases();
    syncCanvasSizeUi();
    rebuildTimeline(); render();
  }
}

function redo() {
  if (state.historyIndex < state.history.length - 1) {
    state.historyIndex++;
    const snap = state.history[state.historyIndex];
    state.gridW = snap.gridW;
    state.gridH = snap.gridH;
    state.frames = snap.frames.map(cloneFrame);
    state.currentFrame = snap.current;
    resetSelectionState({ keepClipboard: true });
    resizeAllCanvases();
    syncCanvasSizeUi();
    rebuildTimeline(); render();
  }
}

// ══════════════════════════════════════════════════════
//  TOOLS
// ══════════════════════════════════════════════════════

function linePixels(x0,y0,x1,y1) {
  const pts=[]; let dx=Math.abs(x1-x0),dy=Math.abs(y1-y0);
  let sx=x0<x1?1:-1, sy=y0<y1?1:-1, err=dx-dy;
  while(true){pts.push([x0,y0]); if(x0===x1&&y0===y1)break;
    let e2=2*err; if(e2>-dy){err-=dy;x0+=sx;} if(e2<dx){err+=dx;y0+=sy;}}
  return pts;
}

function rectPixels(x0,y0,x1,y1) {
  const [minX,maxX]=[Math.min(x0,x1),Math.max(x0,x1)];
  const [minY,maxY]=[Math.min(y0,y1),Math.max(y0,y1)];
  const pts=[];
  for(let x=minX;x<=maxX;x++) for(let y=minY;y<=maxY;y++)
    if(x===minX||x===maxX||y===minY||y===maxY) pts.push([x,y]);
  return pts;
}

function floodFill(x, y, fillColor) {
  const target = getP(curFrame(), x, y);
  if (target === fillColor) return false;
  const stack = [[x,y]], visited = new Set();
  let changed = false;
  while (stack.length) {
    const [cx,cy] = stack.pop(), key = cx+','+cy;
    if (!inBounds(cx,cy) || visited.has(key)) continue;
    visited.add(key);
    if (getP(curFrame(),cx,cy) !== target) continue;
    setP(curFrame(),cx,cy,fillColor);
    changed = true;
    stack.push([cx+1,cy],[cx-1,cy],[cx,cy+1],[cx,cy-1]);
  }
  return changed;
}

function paintAt(x, y, color) {
  if (!inBounds(x,y)) return false;
  let changed = false;
  const frame = curFrame();
  const primaryIndex = idx(x, y);
  if (frame[primaryIndex] !== color) {
    frame[primaryIndex] = color;
    changed = true;
  }
  if (state.mirror) {
    const mx = state.gridW - 1 - x;
    if (inBounds(mx, y)) {
      const mirrorIndex = idx(mx, y);
      if (frame[mirrorIndex] !== color) {
        frame[mirrorIndex] = color;
        changed = true;
      }
    }
  }
  return changed;
}

function copySelection() {
  const sel = state.selection;
  if (!sel) return false;
  state.clipboard = {
    x: sel.x,
    y: sel.y,
    w: sel.w,
    h: sel.h,
    pixels: extractRegion(curFrame(), sel),
  };
  updateSelectionControls();
  return true;
}

function deleteSelection() {
  const sel = state.selection;
  if (!sel) return false;
  clearRegion(curFrame(), sel);
  saveHistory();
  render();
  return true;
}

function cutSelection() {
  if (!copySelection()) return false;
  return deleteSelection();
}

function resolvePasteSource() {
  if (state.clipboard && regionHasContent(state.clipboard.pixels)) {
    return {
      x: state.clipboard.x ?? 0,
      y: state.clipboard.y ?? 0,
      w: state.clipboard.w,
      h: state.clipboard.h,
      pixels: [...state.clipboard.pixels],
    };
  }
  if (state.selectionLifted && regionHasContent(state.selectionLifted.pixels)) {
    return {
      x: state.selectionLifted.x,
      y: state.selectionLifted.y,
      w: state.selectionLifted.w,
      h: state.selectionLifted.h,
      pixels: [...state.selectionLifted.pixels],
    };
  }
  if (state.selection) {
    const pixels = extractRegion(curFrame(), state.selection);
    if (regionHasContent(pixels)) {
      return {
        x: state.selection.x,
        y: state.selection.y,
        w: state.selection.w,
        h: state.selection.h,
        pixels,
      };
    }
  }
  return null;
}

function pasteClipboard(targetRect) {
  const source = resolvePasteSource();
  if (!source) return false;
  const rect = targetRect || (() => {
    const anchor = selectionBounds();
    const x = anchor ? anchor.x + 1 : 0;
    const y = anchor ? anchor.y + 1 : 0;
    return { ...clampSelectionOrigin(x, y, source.w, source.h), w: source.w, h: source.h };
  })();
  stampRegion(curFrame(), rect, source.pixels);
  state.selection = { x: rect.x, y: rect.y, w: rect.w, h: rect.h };
  state.selectionDraft = null;
  state.selectionLifted = null;
  saveHistory();
  render();
  return true;
}

function pasteInPlace() {
  if (!(state.clipboard && regionHasContent(state.clipboard.pixels))) return false;
  const origin = clampSelectionOrigin(state.clipboard.x ?? 0, state.clipboard.y ?? 0, state.clipboard.w, state.clipboard.h);
  return pasteClipboard({ x: origin.x, y: origin.y, w: state.clipboard.w, h: state.clipboard.h });
}

function nudgeSelection(dx, dy) {
  const sel = state.selection;
  if (!sel) return false;
  const next = clampSelectionOrigin(sel.x + dx, sel.y + dy, sel.w, sel.h);
  if (next.x === sel.x && next.y === sel.y) return false;
  const pixels = extractRegion(curFrame(), sel);
  clearRegion(curFrame(), sel);
  stampRegion(curFrame(), { x: next.x, y: next.y, w: sel.w, h: sel.h }, pixels);
  state.selection = { x: next.x, y: next.y, w: sel.w, h: sel.h };
  saveHistory();
  render();
  return true;
}

function copySelectionToNextFrame() {
  const sel = state.selection;
  if (!sel || state.currentFrame >= state.frames.length - 1) return false;
  const pixels = extractRegion(curFrame(), sel);
  stampRegion(state.frames[state.currentFrame + 1], sel, pixels);
  saveHistory();
  render();
  return true;
}

function transformSelectionPixels(transformer) {
  const sel = state.selection;
  if (!sel) return false;
  const sourcePixels = extractRegion(curFrame(), sel);
  const next = transformer(sourcePixels, sel);
  if (!next || !Array.isArray(next.pixels) || !(next.w > 0) || !(next.h > 0)) return false;
  clearRegion(curFrame(), sel);
  const origin = clampSelectionOrigin(sel.x, sel.y, next.w, next.h);
  stampRegion(curFrame(), { x: origin.x, y: origin.y, w: next.w, h: next.h }, next.pixels);
  state.selection = { x: origin.x, y: origin.y, w: next.w, h: next.h };
  saveHistory();
  render();
  return true;
}

function flipSelectionHorizontal() {
  return transformSelectionPixels((pixels, sel) => {
    const out = new Array(sel.w * sel.h).fill(null);
    for (let y = 0; y < sel.h; y++) {
      for (let x = 0; x < sel.w; x++) {
        out[y * sel.w + x] = pixels[y * sel.w + (sel.w - 1 - x)];
      }
    }
    return { w: sel.w, h: sel.h, pixels: out };
  });
}

function flipSelectionVertical() {
  return transformSelectionPixels((pixels, sel) => {
    const out = new Array(sel.w * sel.h).fill(null);
    for (let y = 0; y < sel.h; y++) {
      for (let x = 0; x < sel.w; x++) {
        out[y * sel.w + x] = pixels[(sel.h - 1 - y) * sel.w + x];
      }
    }
    return { w: sel.w, h: sel.h, pixels: out };
  });
}

function rotateSelectionClockwise() {
  return transformSelectionPixels((pixels, sel) => {
    const outW = sel.h;
    const outH = sel.w;
    const out = new Array(outW * outH).fill(null);
    for (let y = 0; y < sel.h; y++) {
      for (let x = 0; x < sel.w; x++) {
        const nx = sel.h - 1 - y;
        const ny = x;
        out[ny * outW + nx] = pixels[y * sel.w + x];
      }
    }
    return { w: outW, h: outH, pixels: out };
  });
}

function cropToSelection() {
  const sel = state.selection;
  if (!sel) return false;
  state.frames = state.frames.map(frame => extractRegion(frame, sel));
  state.gridW = sel.w;
  state.gridH = sel.h;
  state.selection = { x: 0, y: 0, w: sel.w, h: sel.h };
  state.selectionDraft = null;
  state.selectionLifted = null;
  resizeAllCanvases();
  syncCanvasSizeUi();
  saveHistory();
  rebuildTimeline();
  render();
  return true;
}

// ══════════════════════════════════════════════════════
//  MOUSE
// ══════════════════════════════════════════════════════

function canvasPos(e) {
  const rect = mainCanvas.getBoundingClientRect();
  return [
    Math.floor((e.clientX - rect.left) / state.pixelSize),
    Math.floor((e.clientY - rect.top)  / state.pixelSize),
  ];
}

function applyDown(x, y, options = {}) {
  const { tool, color } = state;
  const duplicateSelection = options.duplicateSelection === true;
  state.didMutate = false;
  if (tool==='select') {
    if (!inBounds(x, y)) {
      state.selection = null;
      state.selectionDraft = null;
      render();
      return;
    }
    if (state.selection && pointInRect(x, y, state.selection)) {
      const sel = state.selection;
      state.selectionLifted = {
        x: sel.x,
        y: sel.y,
        w: sel.w,
        h: sel.h,
        originX: sel.x,
        originY: sel.y,
        offsetX: x - sel.x,
        offsetY: y - sel.y,
        duplicate: duplicateSelection,
        pixels: extractRegion(curFrame(), sel),
      };
      if (!duplicateSelection) {
        clearRegion(curFrame(), sel);
        state.didMutate = true;
      }
    } else {
      state.selection = null;
      state.selectionLifted = null;
      state.selectionDraft = { x, y, w: 1, h: 1 };
      state.rectStart = [x, y];
    }
    render();
  }
  else if (tool==='pencil')  { state.didMutate = paintAt(x,y,color); render(); }
  else if (tool==='eraser') { state.didMutate = paintAt(x,y,null); render(); }
  else if (tool==='fill') {
    state.didMutate = floodFill(x,y,color);
    if(state.mirror) state.didMutate = floodFill(state.gridW-1-x,y,color) || state.didMutate;
    render();
  }
  else if (tool==='picker') { applySampledPixel(getP(curFrame(),x,y)); }
  else if (tool==='rect'||tool==='line') { state.rectStart=[x,y]; }
}

function applyMove(x, y) {
  if (!state.isDrawing) return;
  const { tool, color, lastPx, lastPy } = state;
  if (tool==='select') {
    if (state.selectionLifted) {
      const lifted = state.selectionLifted;
      const next = clampSelectionOrigin(x - lifted.offsetX, y - lifted.offsetY, lifted.w, lifted.h);
      lifted.x = next.x;
      lifted.y = next.y;
      render();
    } else if (state.rectStart && inBounds(x, y)) {
      const [sx, sy] = state.rectStart;
      state.selectionDraft = normalizeRect(sx, sy, x, y);
      render();
    }
  }
  else if (tool==='pencil'||tool==='eraser') {
    const c = tool==='pencil' ? color : null;
    const pts = lastPx!==null ? linePixels(lastPx,lastPy,x,y) : [[x,y]];
    pts.forEach(([px,py]) => { state.didMutate = paintAt(px,py,c) || state.didMutate; });
    render();
  } else if ((tool==='rect'||tool==='line') && state.rectStart) {
    const [sx,sy]=state.rectStart;
    const prev=new Array(state.gridW*state.gridH).fill(null);
    const pts=tool==='rect'?rectPixels(sx,sy,x,y):linePixels(sx,sy,x,y);
    pts.forEach(([px,py])=>{ setP(prev,px,py,color); if(state.mirror) setP(prev,state.gridW-1-px,py,color); });
    render(prev);
  }
}

function applyUp(x, y) {
  const { tool, color } = state;
  if (tool==='select') {
    if (state.selectionLifted) {
      const lifted = state.selectionLifted;
      const target = { x: lifted.x, y: lifted.y, w: lifted.w, h: lifted.h };
      if (lifted.duplicate && target.x === lifted.originX && target.y === lifted.originY) {
        state.selection = { x: lifted.originX, y: lifted.originY, w: lifted.w, h: lifted.h };
        state.selectionLifted = null;
        state.selectionDraft = null;
        render();
      } else {
        stampRegion(curFrame(), target, lifted.pixels);
        state.selection = target;
        state.selectionLifted = null;
        state.selectionDraft = null;
        if (lifted.duplicate) state.didMutate = true;
        render();
      }
    } else if (state.rectStart) {
      const [sx, sy] = state.rectStart;
      if (inBounds(sx, sy)) {
        state.selection = normalizeRect(sx, sy, inBounds(x, y) ? x : sx, inBounds(x, y) ? y : sy);
      } else {
        state.selection = null;
      }
      state.selectionDraft = null;
      state.rectStart = null;
      render();
    }
  }
  else if ((tool==='rect'||tool==='line') && state.rectStart && state.isDrawing) {
    const [sx,sy]=state.rectStart;
    const pts=tool==='rect'?rectPixels(sx,sy,x,y):linePixels(sx,sy,x,y);
    pts.forEach(([px,py])=>{ state.didMutate = paintAt(px,py,color) || state.didMutate; });
    state.rectStart=null; render();
  }
  if (state.didMutate) saveHistory();
  state.didMutate = false;
}

wrapper.addEventListener('mousedown', e => {
  if (e.button!==0) return;
  const [x,y]=canvasPos(e);
  state.isDrawing=true; state.lastPx=x; state.lastPy=y;
  applyDown(x,y,{ duplicateSelection: e.altKey });
});
window.addEventListener('mousemove', e => {
  const [x,y]=canvasPos(e);
  document.getElementById('status-pos').textContent =
    `Cursor: ${inBounds(x,y)?x+', '+y:'—'}`;
  if (state.isDrawing) { applyMove(x,y); state.lastPx=x; state.lastPy=y; }
});
window.addEventListener('mouseup', e => {
  if (!state.isDrawing) return;
  const [x,y]=canvasPos(e);
  applyUp(x,y);
  state.isDrawing=false; state.lastPx=null; state.lastPy=null;
});
wrapper.addEventListener('contextmenu', e => {
  e.preventDefault();
  const [x,y]=canvasPos(e);
  applySampledPixel(getP(curFrame(),x,y));
});
wrapper.addEventListener('mouseleave', () => {
  document.getElementById('status-pos').textContent='Cursor: —';
});

function setActiveTool(name) {
  state.tool = name;
  document.querySelectorAll('[data-tool]').forEach(b =>
    b.classList.toggle('active', b.dataset.tool===name));
  const names={select:'Select',pencil:'Pencil',eraser:'Eraser',fill:'Fill',picker:'Eyedropper',rect:'Rectangle',line:'Line'};
  document.getElementById('status-tool').textContent='Tool: '+(names[name]||name);
  const cursors={select:'default',pencil:'crosshair',eraser:'cell',fill:'copy',picker:'default',rect:'crosshair',line:'crosshair'};
  wrapper.style.cursor = cursors[name]||'crosshair';
  updateColorStatus();
}
document.querySelectorAll('[data-tool]').forEach(b =>
  b.addEventListener('click', () => setActiveTool(b.dataset.tool)));

colorPicker.addEventListener('click', e => {
  e.preventDefault();
  e.stopPropagation();
  toggleColorPopover();
});
document.getElementById('color-detail-close').addEventListener('click', closeColorPopover);

colorWheel.addEventListener('mousedown', e => {
  state.colorPickerDrag = 'wheel';
  updateHueFromPointer(e.clientX, e.clientY);
});
colorSquare.addEventListener('mousedown', e => {
  state.colorPickerDrag = 'square';
  updateSvFromPointer(e.clientX, e.clientY);
});
window.addEventListener('mousemove', e => {
  if (state.colorPickerDrag === 'wheel') updateHueFromPointer(e.clientX, e.clientY);
  else if (state.colorPickerDrag === 'square') updateSvFromPointer(e.clientX, e.clientY);
});
window.addEventListener('mouseup', () => {
  state.colorPickerDrag = '';
});
window.addEventListener('resize', () => {
  if (colorPopover.classList.contains('open')) positionColorPopover();
});
document.addEventListener('mousedown', e => {
  if (!colorPopover.classList.contains('open')) return;
  if (colorPopover.contains(e.target) || colorPicker.contains(e.target)) return;
  closeColorPopover();
});
document.addEventListener('keydown', e => {
  if (e.key === 'Escape' && colorPopover.classList.contains('open')) closeColorPopover();
});

colorHex.addEventListener('keydown', e => {
  if (e.key==='Enter') { let v=colorHex.value.trim(); if(!v.startsWith('#')) v='#'+v; if(/^#[0-9a-fA-F]{6}$/.test(v)) setColor(v); }
});
colorHex.addEventListener('blur', () => {
  let v=colorHex.value.trim(); if(!v.startsWith('#')) v='#'+v;
  if(/^#[0-9a-fA-F]{6}$/.test(v)) setColor(v); else colorHex.value=state.color;
});

// ══════════════════════════════════════════════════════
//  ZOOM
// ══════════════════════════════════════════════════════

const ZOOM_LEVELS=[4,6,8,10,12,16,20,24,32,40,48,64];
let zoomIdx=7;
function applyZoom() {
  state.pixelSize=ZOOM_LEVELS[zoomIdx];
  document.getElementById('zoom-label').textContent=
    Math.round(state.pixelSize/24*100)+'%';
  resizeAllCanvases(); render();
}
document.getElementById('btn-zoom-in').addEventListener('click', () =>

function selectFrame(i) {
  state.currentFrame = i;
  document.querySelectorAll('.frame-thumb').forEach((el,j) =>
    el.classList.toggle('active', j===i));
  document.getElementById('frame-counter').textContent=
    `Frame ${i+1} / ${state.frames.length}`;
  render();
}

function addFrame(afterIndex) {
  const i = afterIndex ?? state.frames.length - 1;
  state.frames.splice(i+1, 0, emptyFrame());
  rebuildTimeline();
  selectFrame(i+1);
  saveHistory();
}

function duplicateFrame(i) {
  state.frames.splice(i+1, 0, cloneFrame(state.frames[i]));
  rebuildTimeline();
  selectFrame(i+1);
  saveHistory();
}

function deleteFrame(i) {
  if (state.frames.length===1) return;
  state.frames.splice(i,1);
  const newIdx = Math.min(i, state.frames.length-1);
  rebuildTimeline();
  selectFrame(newIdx);
  saveHistory();
}

function moveFrame(i, dir) {
  const j = i + dir;
  if (j<0||j>=state.frames.length) return;
  [state.frames[i], state.frames[j]] = [state.frames[j], state.frames[i]];
  rebuildTimeline();
  selectFrame(j);
  saveHistory();
}

function rebuildTimeline() {
  const strip = document.getElementById('frame-strip-wrap');
  // remove old thumbs
  strip.querySelectorAll('.frame-thumb').forEach(el => el.remove());
  const addBtn = document.getElementById('btn-add-frame');
  state.frames.forEach((frame, i) => {
    const div = document.createElement('div');
    div.className = 'frame-thumb' + (i===state.currentFrame?' active':'');
    const c = document.createElement('canvas');
    renderThumb(c, frame);
    const num = document.createElement('div');
    num.className='frame-num'; num.textContent=i+1;
    const btns = document.createElement('div'); btns.className='frame-btns';
    const mkBtn=(txt,cb)=>{const b=document.createElement('button');b.className='frame-btn';b.textContent=txt;b.addEventListener('click',e=>{e.stopPropagation();cb();});return b;};
    btns.appendChild(mkBtn('⧉', ()=>duplicateFrame(i)));
    btns.appendChild(mkBtn('←', ()=>moveFrame(i,-1)));
    btns.appendChild(mkBtn('→', ()=>moveFrame(i,+1)));
    btns.appendChild(mkBtn('✕', ()=>deleteFrame(i)));
    div.append(c, num, btns);
    div.addEventListener('click', () => selectFrame(i));
    strip.insertBefore(div, addBtn);
  });
  document.getElementById('frame-counter').textContent=
    `Frame ${state.currentFrame+1} / ${state.frames.length}`;
}

function exportSinglePNG() {
  const {gridW:w,gridH:h}=state;
  const exp=document.createElement('canvas'); exp.width=w; exp.height=h;
  const ec=exp.getContext('2d'); ec.clearRect(0,0,w,h);
  curFrame().forEach((c,i)=>{ if(c){ec.fillStyle=c;ec.fillRect(i%w,Math.floor(i/w),1,1);} });
  exp.toBlob(blob=>{const a=document.createElement('a');a.href=URL.createObjectURL(blob);
    a.download=`frame${state.currentFrame+1}-${w}x${h}.png`;a.click();}, 'image/png');
}

function exportSpriteSheet() {
  const {gridW:w,gridH:h,frames}=state;
  const exp=document.createElement('canvas'); exp.width=w*frames.length; exp.height=h;
  const ec=exp.getContext('2d'); ec.clearRect(0,0,exp.width,h);
  frames.forEach((frame,fi)=>{
    frame.forEach((c,i)=>{ if(c){ec.fillStyle=c;ec.fillRect(fi*w+(i%w),Math.floor(i/w),1,1);} });
  });
  exp.toBlob(blob=>{const a=document.createElement('a');a.href=URL.createObjectURL(blob);
    a.download=`spritesheet-${frames.length}x-${w}x${h}.png`;a.click();}, 'image/png');
}

function exportGIF() {
  const {gridW:w,gridH:h,frames,fps}=state;
  const delayCs=Math.round(100/Math.max(1,fps));
  const gif=encodeGIF(frames,w,h,delayCs);
  const blob=new Blob([gif],{type:'image/gif'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download=`animation-${frames.length}frames-${w}x${h}.gif`;a.click();
}

function saveProject() {
  const project = {
    version: 1,
    gridW:   state.gridW,
    gridH:   state.gridH,
    fps:     parseInt(document.getElementById('fps-input').value) || state.fps,
    currentFrame: state.currentFrame,
    recentColors: state.recentColors,

  };
  const json = JSON.stringify(project);
  const blob = new Blob([json], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  // suggest a filename based on canvas size + frame count
  a.download = `pixel-art-${state.gridW}x${state.gridH}-${state.frames.length}frames.pixelart`;
  a.click();
  URL.revokeObjectURL(a.href);
}

async function importImageToCurrentCanvas(file) {
  if (!file) return;
  const hasContent = state.frames.some(frame => frame.some(pixel => pixel !== null));
  if (hasContent && !confirm('Import over the current sprite? Existing canvas content will be replaced.')) return;

  let fit = prompt('Import mode: fit, fill, or stretch', 'fit');
  fit = ['fit', 'fill', 'stretch'].includes((fit || '').trim().toLowerCase())
    ? fit.trim().toLowerCase()
    : 'fit';
  const maxColorsRaw = prompt('Max colors? Use 0 to keep all colors, or try 16 / 32 for cleaner pixel art.', '32');
  const parsedMaxColors = parseInt(maxColorsRaw, 10);
  const maxColors = Number.isFinite(parsedMaxColors) && parsedMaxColors >= 0 ? parsedMaxColors : 32;
  const removeCornerBackground = confirm('Treat colors near the image corners as transparent? This helps with JPGs that have a flat background.');

  try {
    const image = await loadImageFile(file);
    const importedCanvas = drawImageToCanvas(image, state.gridW, state.gridH, { fit });
    const importedCtx = importedCanvas.getContext('2d', { willReadFrequently: true });
    const imageData = importedCtx.getImageData(0, 0, state.gridW, state.gridH);
    const frame = imageDataToFrame(imageData, {
      maxColors,
      alphaThreshold: 10,
      transparentMode: removeCornerBackground ? 'corner' : 'alpha',
      transparentThreshold: 42,
    });

    stopPlay();
    state.frames = [frame];
    state.currentFrame = 0;
    resetSelectionState();
    if (!document.getElementById('sprite-name').value.trim()) {
      document.getElementById('sprite-name').value = slugifyName(file.name, 'imported_sprite');
    }

    const importedColors = [...new Set(frame.filter(Boolean))];
    if (importedColors.length) {
      state.recentColors = normalizeRecentColors([...importedColors.slice(0, 10), ...state.recentColors]);
      buildRecent();
      setColor(importedColors[0]);
    }

    resetHistory();
    rebuildTimeline();
    selectFrame(0);
    render();
    alert(`Imported "${file.name}" into a ${state.gridW}x${state.gridH} sprite.`);
  } catch (error) {
    alert(error?.message || 'Could not import that image.');
  }
}

function loadProject(file) {
  const reader = new FileReader();
  reader.onload = e => {
    let project;
    try { project = JSON.parse(e.target.result); }
    catch { alert('Could not read file — make sure it is a valid .pixelart project.'); return; }
    if (!project || typeof project !== 'object') {
      alert('File is missing required project data.'); return;
    }
    const normalized = normalizeSpriteData(project);

    stopPlay();

    state.gridW = normalized.gridW;
    state.gridH = normalized.gridH;
    state.fps   = normalized.fps;
    state.frames = normalized.frames.map(cloneFrame);
    resetSelectionState();
    const requestedFrame = Number(project.currentFrame);
    state.currentFrame = Math.max(0, Math.min(
      Number.isFinite(requestedFrame) ? Math.floor(requestedFrame) : 0,
      state.frames.length - 1
    ));
    state.recentColors = normalizeRecentColors(project.recentColors);

    // Sync grid size selector
    const sel = document.getElementById('grid-size-select');
    const opt = [...sel.options].find(o => parseInt(o.value) === state.gridW);
    if (opt) sel.value = opt.value;

    // Sync FPS input
    document.getElementById('fps-input').value = state.fps;

    // Reset history
    resetHistory();

    // Auto-fit zoom
    const area = document.getElementById('canvas-area');
    const maxPx = Math.min(area.clientWidth, area.clientHeight) * 0.85;
    const ideal = Math.floor(maxPx / state.gridW);
    zoomIdx = ZOOM_LEVELS.reduce((b,v,i) =>
      Math.abs(v-ideal) < Math.abs(ZOOM_LEVELS[b]-ideal) ? i : b, 0);
    state.pixelSize = ZOOM_LEVELS[zoomIdx];
    document.getElementById('zoom-label').textContent =
      Math.round(state.pixelSize / 24 * 100) + '%';

    buildRecent();
    resizeAllCanvases();
    rebuildTimeline();
    selectFrame(state.currentFrame);
    syncCanvasSizeUi();
  };
  reader.readAsText(file);
}

// ══════════════════════════════════════════════════════
//  KEYBOARD SHORTCUTS
// ══════════════════════════════════════════════════════

document.addEventListener('keydown', e => {
  if (e.target.tagName==='INPUT') return;
  const key=e.key.toLowerCase();
  if (e.ctrlKey||e.metaKey) {
    if (key==='z'){e.preventDefault();undo();return;}
    if (key==='y'){e.preventDefault();redo();return;}
    if (e.shiftKey && key==='v'){ if (pasteInPlace()) e.preventDefault(); return; }
    if (key==='c'){ if (copySelection()) e.preventDefault(); return; }
    if (key==='x'){ if (cutSelection()) e.preventDefault(); return; }
    if (key==='v'){ if (pasteClipboard()) e.preventDefault(); return; }
    return;
  }
  if (key==='delete' || key==='backspace') {
    if (deleteSelection()) e.preventDefault();
    return;
  }
  if (key==='arrowup') { if (nudgeSelection(0, -1)) e.preventDefault(); return; }
  if (key==='arrowdown') { if (nudgeSelection(0, 1)) e.preventDefault(); return; }
  if (key==='arrowleft') { if (nudgeSelection(-1, 0)) e.preventDefault(); return; }
  if (key==='arrowright') { if (nudgeSelection(1, 0)) e.preventDefault(); return; }
  const toolMap={v:'select',p:'pencil',e:'eraser',f:'fill',i:'picker',r:'rect',l:'line'};
  if (toolMap[key]) { setActiveTool(toolMap[key]); return; }
  if (key==='g') btnGrid.click();
  if (key==='m') btnMirror.click();
  if (key==='o') btnOnion.click();
  if (key==='t') btnTile.click();
  if (key==='a') addFrame();
  if (key==='[') { if(state.currentFrame>0) selectFrame(state.currentFrame-1); }
  if (key===']') { if(state.currentFrame<state.frames.length-1) selectFrame(state.currentFrame+1); }
  if (key===' ') { e.preventDefault(); state.playing?stopPlay():startPlay(); }
  if (key==='+'||key==='=') document.getElementById('btn-zoom-in').click();
  if (key==='-') document.getElementById('btn-zoom-out').click();
});

function saveToProject() {
  const rawName = document.getElementById('sprite-name').value.trim();
  const name = rawName.replace(/\s+/g, '_');
  if (!name) { alert('Enter a sprite name first — e.g. "hero_idle" or "tile_grass".'); return; }

  let project = getProject();
  if (!project) project = blankProject('Untitled Game');

  project.sprites[name] = {
    gridW:  state.gridW,
    gridH:  state.gridH,
    fps:    parseInt(document.getElementById('fps-input').value) || state.fps,
    frames: state.frames.map(f => [...f]),
    tags:   getSelectedTags(),
    folder: normalizeFolderPath(document.getElementById('sprite-folder').value),
    modified: new Date().toISOString(),
  };
  setProject(project);
  renderProjectSprites();

  // Flash confirmation on button
  const btn = document.getElementById('btn-save-to-project');
  const orig = btn.textContent;
  btn.textContent = '✓ Saved!';
  setTimeout(() => { btn.textContent = orig; }, 1600);
}

function loadSpriteFromProject(name, sd) {
  const hasContent = state.frames.some(f => f.some(p => p !== null));
  if (hasContent && !confirm(`Load "${name}"? Unsaved canvas changes will be lost.`)) return;
  const normalized = normalizeSpriteData(sd);

  stopPlay();
  state.gridW = normalized.gridW; state.gridH = normalized.gridH;
  state.fps = normalized.fps;
  state.frames = normalized.frames.map(cloneFrame);
  state.currentFrame = 0;
  resetSelectionState();

  document.getElementById('sprite-name').value = name;
  document.getElementById('sprite-folder').value = normalized.folder || '';
  document.getElementById('fps-input').value = state.fps;
  setSelectedTags(normalized.tags || []);
  const sel = document.getElementById('grid-size-select');
  const opt = [...sel.options].find(o => parseInt(o.value) === state.gridW);
  if (opt) sel.value = opt.value;

  // Auto-fit zoom to viewport
  const area = document.getElementById('canvas-area');
  const maxPx = Math.min(area.clientWidth, area.clientHeight) * 0.85;
  const ideal = Math.floor(maxPx / state.gridW);
  zoomIdx = ZOOM_LEVELS.reduce((b,v,i) =>
    Math.abs(v-ideal) < Math.abs(ZOOM_LEVELS[b]-ideal) ? i : b, 0);
  state.pixelSize = ZOOM_LEVELS[zoomIdx];
  document.getElementById('zoom-label').textContent =
    Math.round(state.pixelSize / 24 * 100) + '%';

  resetHistory();
  resizeAllCanvases();
  rebuildTimeline();
  selectFrame(0);
  syncCanvasSizeUi();
}

function renderProjectSprites() {
  const project  = getProject();
  const badge    = document.getElementById('project-badge');
  const list     = document.getElementById('project-sprites-list');
  const section  = document.getElementById('project-sprites-section');

  if (!project) {
    badge.textContent = 'No Project';
    badge.style.color = '#506070';
    section.style.display = 'none';
    return;
  }

  badge.textContent = '\uD83D\uDCC1 ' + (project.name || 'Untitled Game');
  badge.style.color = '#8090c0';
  section.style.display = 'block';

  const sprites = Object.entries(project.sprites || {}).sort((a, b) => {
    const folderA = a[1].folder || '';
    const folderB = b[1].folder || '';
    if (folderA !== folderB) return folderA.localeCompare(folderB);
    return a[0].localeCompare(b[0]);
  });
  list.innerHTML = '';

  if (!sprites.length) {
    list.innerHTML = '<div style="font-size:11px;color:#506070">No sprites yet</div>';
    return;
  }

  sprites.forEach(([name, sd]) => {
    const div = document.createElement('div');
    div.className = 'proj-sprite';
    div.title = `Load "${name}" (${sd.gridW}×${sd.gridH}, ${(sd.frames||[]).length} frame${(sd.frames||[]).length!==1?'s':''})`;

    const c = document.createElement('canvas');
    c.width = sd.gridW; c.height = sd.gridH;
    c.style.cssText = 'width:22px;height:22px';
    const cc = c.getContext('2d');
    for (let y = 0; y < sd.gridH; y++) for (let x = 0; x < sd.gridW; x++) {
      cc.fillStyle = (x+y)%2===0 ? '#3a3a5a' : '#2a2a4a'; cc.fillRect(x,y,1,1);
    }
    ((sd.frames && sd.frames[0]) || []).forEach((col, i) => {
      if (col) { cc.fillStyle=col; cc.fillRect(i%sd.gridW, Math.floor(i/sd.gridW),1,1); }
    });

    const right = document.createElement('div');
    right.style.cssText = 'flex:1;overflow:hidden;display:flex;flex-direction:column;gap:2px';

    const lbl = document.createElement('div');
    lbl.className = 'proj-sprite-name';
    lbl.textContent = name;

    const folder = document.createElement('div');
    folder.className = 'proj-sprite-folder';
    folder.textContent = sd.folder ? sd.folder : 'Ungrouped';

    const tagRow = document.createElement('div');
    tagRow.className = 'proj-sprite-tags';
    (sd.tags || []).forEach(t => {
      const b = document.createElement('span');
      b.className = 'proj-tag-badge'; b.dataset.tag = t; b.textContent = t;
      tagRow.appendChild(b);
    });

    right.append(lbl, folder, tagRow);
    div.append(c, right);
    div.addEventListener('click', () => loadSpriteFromProject(name, sd));
    list.appendChild(div);
  });
}

const _openSprite = localStorage.getItem('rpgstudio_openSprite');
if (_openSprite) {
  localStorage.removeItem('rpgstudio_openSprite');
  const _proj = getProject();
  if (_proj && _proj.sprites && _proj.sprites[_openSprite]) {
    loadSpriteFromProject(_openSprite, _proj.sprites[_openSprite]);
  }
}
renderProjectSprites();
</script>
</body>
